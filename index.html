<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>

  <style>
    :root {
      --bg: #0f1220;
      --card: #161a2e;
      --text: #e6e8ff;
      --accent: #6cf2c2;
      --glow: rgba(108, 242, 194, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top, #1b1f3a, #0f1220 60%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 18px 0 8px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 18px;
    }

 /*----------------------------- Game CSS ----------------------------------- */
    .game-grid {
      	display: grid;
      	flex-direction: column;
      	gap: 10px;
      	width: min(900px, 92%);
    }

	.game-card {
    	display: flex;                  /* image left, info right */
    	align-items: center;            /* vertical centering */
    	gap: 20px;                      /* space between image and text */
    	text-decoration: none;          /* remove underline */
	}
    
	.game-info {
    	display: flex;
    	flex-direction: column;         /* stack title & desc vertically */
    	justify-content: center;        /* vertically center next to image */
    	text-align: center;               /* optional */
    	color: var(--text);                   /* or whatever you want */
	}

	.game-image {
		display: block;
    	flex-shrink: 0;                 /* prevent shrinking */
    	border-radius: 16px;            /* rounded corners */
    	overflow: hidden;               /* ensures image follows radius */
    	/* box-shadow: 5px 2px 5px rgba(210,210,210,0.7);*/ /* shadow */
    	width: 150px;                   /* or whatever size you want */
    	height: 165px;
	}

	.game-image img {
    	width: 100%;
    	height: auto;
    	border-radius: 16px;
    	object-fit: contain;              /* maintain aspect ratio & cover container */
    	display: block;                 /* remove inline gap */
	}

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at 50% 0%,
        var(--glow),
        transparent 60%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .game-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.6),
        0 0 30px var(--glow);
    }

    .game-card:hover::before {
      opacity: 0.8;
    }
    
    
	.game-title {
  		font-size: 18px;
  		font-weight: 600;
  		line-height: 1.1;
	}

	.game-desc {
 		font-size: 14px;
  		line-height: 1.3;
  		opacity: 0.75;
	}
	
	
    footer {
      margin: 14px 0 24px;
      opacity: 0.4;
      font-size: 0.9rem;
    }


    
    
  </style>
</head>

<body>

  <h1>Pick Your Puzzle</h1>
  <div class="subtitle">Three games. One brain workout</div>

  <div class="game-grid">

    <a class="game-card" href="https://crswordle.com/" target="_blank">
    	<span class="game-image">
  			<img src="images/crosswordle.jpg" alt="xwordle">
  		</span>
  		<span class="game-info">
  			<span class="game-title">Cross-Wordle</span>
  			<span class="game-desc">Crossword version of Wordle game</span>
  		</span>
	</a>

    <a class="game-card" href="https://findpathnow.com" target="_blank">
        <span class="game-image">
      		<img src="images/findpath.jpg" alt="findpath">
        </span>
        <div class="game-info">
      		<span class="game-title">Find-Path-Now</span>
      		<span class="game-desc">Word search, but for whole sentences</span>
      	</div>
    </a>

    <a class="game-card" href="https://freeaword.com" target="_blank">
        <span class="game-image">
      		<img src="images/freeword.jpg" alt="freeword">
        </span>
      	<div class="game-info">
      		<span class="game-title">Free-A-Word</span>
      		<span class="game-desc">Solitaire game based on letters</span>
      	</div>
    </a>

  </div>

  <footer>© AberGames Studio</footer>

</body>
</html>
