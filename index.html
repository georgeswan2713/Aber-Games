<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>

  <style>
    :root {
      --bg: #0f1220;
      --card: #161a2e;
      --text: #e6e8ff;
      --accent: #6cf2c2;
      --glow: rgba(108, 242, 194, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top, #1b1f3a, #0f1220 60%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 48px 0 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 48px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 36px;
      width: min(900px, 92%);
    }

    .game-card {
      position: relative;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(180deg, #1b2042, var(--card));
      border-radius: 16px;
      overflow: hidden;
        height: auto;   
      box-shadow: 0 0 0 rgba(0,0,0,0);
      transform: translateY(0) scale(1);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }
    
    .game-info {
  		background: linear-gradient(180deg, #1b2042, #161a2e);
  		min-height: 40px;     /* 👈 controls blue section height */
  		padding: 14px 16px;
  		text-align: center;
  		height: 152px;

  		display: block;
  		flex: 0 0 auto;  
  		flex-direction: column;
  		justify-content: center; /* vertically centers text */
	}

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at 50% 0%,
        var(--glow),
        transparent 60%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .game-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.6),
        0 0 30px var(--glow);
    }

    .game-card:hover::before {
      opacity: 0.8;
    }

    .game-card img {
      width: 100%;
      height: 300px;
        object-fit: contain;
      display: block;
    }

    footer {
      margin: 64px 0 24px;
      opacity: 0.4;
      font-size: 0.9rem;
    }
    
    /* === Card bottom section === */
.game-info {
  background: linear-gradient(180deg, #1b2042, #161a2e);
  padding: 10px 12px;
  text-align: center;

  display: flex;
  flex-direction: column;
  gap: 4px;

  /* IMPORTANT: let content define height */
  height: auto;
}

/* Title */
.game-title {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.1;
}

/* Description */
.game-desc {
  font-size: 14px;
  line-height: 1.3;
  opacity: 0.75;
}
    
    
  </style>
</head>

<body>

  <h1>Pick Your Puzzle</h1>
  <div class="subtitle">Three games. One brain workout.</div>

  <div class="game-grid">

    <a class="game-card" href="/xwordle">
  		<img src="images/crosswordle.jpg" alt="xwordle">
  		 <div class="game-info">
  			<span class="game-title">Cross-Wordle</span>
  			<span class="game-desc">Combines the Fun of Crosswords With the Fun of Wordle</span>
  		</div>
	</a>

    <a class="game-card" href="/findpath">
      <img src="images/findpath.jpg" alt="findpath">
      <div class="game-info">
      	<span class="game-title">Find-The-Path</span>
      	<span class="game-desc">Like WordSearch, but Searching for a Whole Sentence</span>
      </div>
    </a>

    <a class="game-card" href="/freeword">
      <img src="images/freeword.jpg" alt="freeword">
      <div class="game-info">
      	<span class="game-title">Free-A-Word</span>
      	<span class="game-desc">Solitaire game. Re-arrange Letters to Free the Answer</span>
      </div>
    </a>

  </div>

  <footer>© Swan Games Studio</footer>

</body>
</html>
