<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abergames Hub</title>
  
  <!-- Open Graph (Facebook/LinkedIn) -->
	<meta property="og:title" content="AberGames">
	<meta property="og:description" content="Three Games. One Brain Workout">
	<meta property="og:image" content="https://www.abergames.com/images/Social-Media-Summary.jpg">
	<meta property="og:url" content="https://www.abergames.com">
	<meta property="og:type" content="website">

	<!-- Twitter -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content=AberGames">
	<meta name="twitter:description" content="Abergames Games Hub. Three Games. One Brain Workout">
	<meta name="twitter:image" content="https://www.abergames.com/images/Social-Media-Summary.jpg">
    
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<link rel="icon" href="images/favicon.ico" type="image/x-icon">

  <style>
    :root {
      --bg: #0f1220;
      --card: #161a2e;
      --text: #e6e8ff;
      --accent: #6cf2c2;
    }

    * {
      box-sizing: border-box;
    }

	html, body {
  		height: 100%;
  		overflow: hidden;
	}
	
    body {
      margin: 0;
      height: 100dvh;   /* exact viewport height */
      overflow: hidden; /* prevent scroll */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top, #1b1f3a, #0f1220 60%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
        justify-content: center; /* centers content vertically */
  		align-items: center;
  		gap: 12px; /* replaces margins */
    }

    h1 {
      margin: 0;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 0px;
    }

 /*----------------------------- Game CSS ----------------------------------- */
    .game-grid {
      	display: grid;
      	flex-direction: column;
      	gap: 10px;
      	width: min(900px, 92%);
    }

	.game-card {
    display: flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    color: inherit;

    -webkit-tap-highlight-color: transparent;
    outline: none;
    user-select: none;
}

.game-card:focus,
.game-card:active,
.game-card:focus-visible {
    outline: none;
    background: transparent;
}

.game-card img {
    pointer-events: none; /* optional: tap is handled by the card, not image */
}
    
	.game-info {
    	display: flex;
    	flex-direction: column;         /* stack title & desc vertically */
    	justify-content: center;        /* vertically center next to image */
    	text-align: center;               /* optional */
    	color: var(--text);                   /* or whatever you want */
	}

	.game-image {
		display: block;
    	flex-shrink: 0;                 /* prevent shrinking */
    	border-radius: 16px;            /* rounded corners */
    	overflow: hidden;               /* ensures image follows radius */
    	/* box-shadow: 5px 2px 5px rgba(210,210,210,0.7);*/ /* shadow */
    	width: 150px;                   /* or whatever size you want */
    	height: 165px;
	}

	.game-image img {
    	width: 100%;
    	height: auto;
    	border-radius: 16px;
    	object-fit: contain;              /* maintain aspect ratio & cover container */
    	display: block;                 /* remove inline gap */
	}
 
	.game-title {
  		font-size: 18px;
  		font-weight: 600;
  		line-height: 1.1;
	}

	.game-desc {
 		font-size: 14px;
  		line-height: 1.3;
  		opacity: 0.75;
	}
	
	 .game-link img {
      	width: 200px;
      	height: auto;
      	cursor: pointer;
      	border-radius: 8px;
      	box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      	transition: transform 0.2s;
    	}
	
	
    footer {
      margin: 0px;
      opacity: 0.4;
      font-size: 0.9rem;
    }


    
    
  </style>
</head>

<body>

  <h1>Pick Your Puzzle</h1>
  <div class="subtitle">Three games. One brain workout</div>

  <div class="game-grid">
  	<a class="game-card" href="#" onclick="openCrswordle(); return false;">
    	<span class="game-image">
      		<img src="images/crosswordle.jpg" alt="xwordle">
    	</span>
    	<span class="game-info">
  			<span class="game-title">Cross-Wordle</span>
  			<span class="game-desc">Crossword version of Wordle game</span>
    	</span>
	</a>

	<a class="game-card" href="#" onclick="openFindpathnow(); return false;">
    	<span class="game-image">
      		<img src="images/findpath.jpg" alt="findpath">
    	</span>
    	<span class="game-info">
      		<span class="game-title">Find-Path-Now</span>
      		<span class="game-desc">Word search, but for whole sentences</span>
      	</span>
    </a>

	<a class="game-card" href="#" onclick="openFreeaword(); return false;">
    	<span class="game-image">
      		<img src="images/freeword.jpg" alt="freeword">
    	</span>
    	<span class="game-info">
      		<span class="game-title">Free-A-Word</span>
      		<span class="game-desc">Solitaire game based on letters</span>
    	</span>
	</a>

  </div>

  <footer>© AberGames Studio</footer>

	<script>
		function openCrswordle() {
  			const url = "https://crswordle.com";
  			const tabName = "crswordleTab";
  			const win = window.open(url, tabName);
  			if (win) win.focus(); // brings existing tab to front
		}
		
		function openFindpathnow() {
      		const url = "https://findpathnow.com";
      		const tabName = "findpathnowTab";
      		const win = window.open(url, tabName);
      		if (win) win.focus(); // brings existing tab to front
    	}
	
    	function openFreeaword() {
      		const url = "https://freeaword.com";
      		const tabName = "freeawordTab";
      		const win = window.open(url, tabName);
      		if (win) win.focus(); // brings existing tab to front
    	}
 
  	</script>
  
  
</body>
</html>
