<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>

  <style>
    :root {
      --bg: #0f1220;
      --card: #161a2e;
      --text: #e6e8ff;
      --accent: #6cf2c2;
      --glow: rgba(108, 242, 194, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top, #1b1f3a, #0f1220 60%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 18px 0 8px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 18px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      width: min(900px, 92%);
    }

    .game-card {
 		position: relative;
  		text-decoration: none;
  		color: var(--text);
  		background: linear-gradient(180deg, #1b2042, var(--card));
		border-radius: 16px;
		overflow: hidden;
		box-shadow: 0 0 0 rgba(0,0,0,0);
		transform: translateY(0) scale(1);
		transition: transform 0.3s ease, box-shadow 0.3s ease;
		
		display: flex;
		flex-direction: row;
		align-items: center;
		justify-content: space-between;
		
		min-height: 150px;
		padding: 12px 16px;
	}
    
   .game-info {
  		flex: 1;
  		display: flex;
  		flex-direction: column;
  		justify-content: center;
  		gap: 8px;
  		padding-right: 12px;
  		text-align: center;
	}

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at 50% 0%,
        var(--glow),
        transparent 60%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .game-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.6),
        0 0 30px var(--glow);
    }

    .game-card:hover::before {
      opacity: 0.8;
    }

    
 	.game-image {
  		flex: 0 0 160px;
  		display: flex;
  		justify-content: center;
  		align-items: center;
  		margin-right: 14px;
	}

	.game-image img {
  		width: 100%;
  		max-width: 140px;
  		max-height: 140px;
  		object-fit: contain;
  		display: block;
  		border-radius: 10px;  /* <-- rounds corners */
  		box-shadow: 5px 5px 5px rgba(150,150, 150,0.6);
 	}
 	
    footer {
      margin: 14px 0 24px;
      opacity: 0.4;
      font-size: 0.9rem;
    }


	.game-title {
  		font-size: 18px;
  		font-weight: 600;
  		line-height: 1.1;
	}

	.game-desc {
 		font-size: 14px;
  		line-height: 1.3;
  		opacity: 0.75;
	}
    
    
  </style>
</head>

<body>

  <h1>Pick Your Puzzle</h1>
  <div class="subtitle">Three games. One brain workout</div>

  <div class="game-grid">

    <a class="game-card" href="/xwordle/">
    	<span class="game-image">
  			<img src="images/crosswordle.jpg" alt="xwordle">
  		</span>
  		<div class="game-info">
  			<span class="game-title">Cross-Wordle</span>
  			<span class="game-desc">Crossword Version of Wordle Game</span>
  		</div>
	</a>

    <a class="game-card" href="/findpath">
        <span class="game-image">
      		<img src="images/findpath.jpg" alt="findpath">
        </span>
        <div class="game-info">
      		<span class="game-title">Find-Path-Now</span>
      		<span class="game-desc">Word Search, but for Whole Sentences</span>
      	</div>
    </a>

    <a class="game-card" href="/freeword">
        <span class="game-image">
      		<img src="images/freeword.jpg" alt="freeword">
        </span>
      	<div class="game-info">
      		<span class="game-title">Free-A-Word</span>
      		<span class="game-desc">Solitaire Game Based on Letters</span>
      	</div>
    </a>

  </div>

  <footer>© AberGames Studio</footer>

</body>
</html>
